  <!-- Wordmark + copy -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="470" y="214" font-size="22" font-weight="700" letter-spacing="3" fill="#D2724F">macOS&#160;&#160;·&#160;&#160;HEBREW&#160;&#160;·&#160;&#160;ARABIC&#160;&#160;·&#160;&#160;PERSIAN</text>
    <text x="468" y="300" font-size="82" font-weight="800" letter-spacing="-1" fill="#F6F1E7">Claude Desktop RTL</text>
    <text x="470" y="360" font-size="29" font-weight="500" fill="#B9ABA0">Real-time right-to-left text support, in chat and replies.</text>
    <text x="470" y="398" font-size="29" font-weight="500" fill="#B9ABA0">Your original Claude.app is never touched.</text>

    <!-- RTL sample chips. Each label is its own center-anchored run (no explicit direction attr),
         so the glyph run stays correct while absolute x placement wins in every SVG engine -->
    <g>
      <rect x="470" y="446" width="200" height="62" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="570" y="486" text-anchor="middle" font-size="30" fill="#F6F1E7">שלום עולם</text>

